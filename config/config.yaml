project:
  name: ecom-ru-stat-analysis
  random_seed: 42

analysis:
  start_year: 2014
  end_year: 2025
  target_column: share_online
  region_column: region
  time_column: year
  latest_top_n: 15
  heatmap_top_n: 25
  outlier_iqr_multiplier: 1.5

paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  external_data: data/external
  figures: outputs/figures
  tables: outputs/tables
  models: outputs/models
  logs: outputs/logs

sources:
  rosstat:
    enabled: true
    description: "Rosstat retail internet sales share by regions"
    local_filename: "rosstat_share_online_regions.xlsx"
    sheet_name: "с 2014 года"
  cbr:
    enabled: false
    description: "Bank of Russia API data"
  emiss:
    enabled: false
    description: "EMISS indicator data"
  datainsight:
    enabled: false
    description: "Industry report data"
  akit:
    enabled: false
    description: "Industry market summaries"

external_factors:
  population: "population_by_region_year.csv"
  income_pc: "income_pc_by_region_year.csv"
  online_buyers_pct: "online_buyers_pct_by_region_year.csv"
  cashless_payments_index: "cashless_payments_index_by_region_year.csv"

modeling:
  forecast_horizon: 3
  holdout_years: 2